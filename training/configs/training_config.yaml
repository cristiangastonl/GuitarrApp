# GuitarrApp ML Training Configuration

dataset:
  raw_path: "assets/audio/chords/clean"
  augmented_path: "training/dataset/augmented"
  features_path: "training/dataset/features"
  labels_path: "training/dataset/labels.json"
  split_ratios:
    train: 0.8
    val: 0.1
    test: 0.1

augmentation:
  samples_per_original: 40
  time_stretch_range: [0.9, 1.1]
  pitch_shift_range: [-1.0, 1.0]  # semitones
  noise_snr_range: [20, 40]  # dB
  volume_range: [0.7, 1.3]
  include_silence_class: true
  silence_samples: 500

mel_params: "training/configs/mel_params.json"  # shared config

model:
  architecture: "small_cnn"
  conv_filters: [32, 64, 128]
  dense_units: 64
  dropout_rates:
    conv: 0.25
    dense: 0.3
    final: 0.4

training:
  optimizer: "adam"
  learning_rate: 0.001
  batch_size: 32
  max_epochs: 100
  early_stopping_patience: 10
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  use_class_weights: true

spec_augment:
  freq_mask_param: 5
  time_mask_param: 10
  num_freq_masks: 2
  num_time_masks: 2

export:
  quantization: "int8"
  representative_samples: 200
  output_path: "training/models/exports/chord_classifier_int8.tflite"
  labels_path: "training/models/exports/labels.txt"
  max_size_kb: 500

targets:
  min_accuracy: 0.85
  max_inference_ms: 50
  max_model_size_kb: 500
