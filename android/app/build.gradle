plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Configuraciones de seguridad
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.guitarrapp"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.guitarrapp"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // Configuraciones de seguridad
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // Protección contra debug en producción
        buildConfigField "boolean", "IS_DEBUG_BUILD", "false"
        
        // Configuración de red segura
        manifestPlaceholders = [
            usesCleartextTraffic: "false"
        ]
    }

    // Configuración de firma de aplicación
    signingConfigs {
        release {
            if (keystoreProperties['keyAlias'] != null) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
        debug {
            // Configuración de debug con clave temporal
            keyAlias 'androiddebugkey'
            keyPassword 'android'
            storeFile file('debug.keystore')
            storePassword 'android'
        }
    }

    buildTypes {
        release {
            // Configuraciones de seguridad para producción
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Firma de aplicación
            signingConfig signingConfigs.release
            
            // Protección adicional
            debuggable false
            jniDebuggable false
            renderscriptDebuggable false
            zipAlignEnabled true
            
            // Configuraciones de seguridad adicionales
            buildConfigField "String", "BUILD_TYPE", '"release"'
            
            // Deshabilitar logging en producción
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
        }
        
        debug {
            debuggable true
            minifyEnabled false
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            
            buildConfigField "String", "BUILD_TYPE", '"debug"'
            buildConfigField "boolean", "ENABLE_LOGGING", "true"
        }
        
        profile {
            initWith debug
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            buildConfigField "String", "BUILD_TYPE", '"profile"'
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
        }
    }

    // Configuraciones de seguridad adicionales
    packagingOptions {
        // Prevenir archivos duplicados y filtrar recursos sensibles
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
    }

    // Configuración de lint para detectar problemas de seguridad
    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
        abortOnError false
        
        // Habilitar verificaciones de seguridad
        enable 'LogConditional'
        enable 'HardcodedDebugMode'
        enable 'SetWorldReadable'
        enable 'SetWorldWritable'
        enable 'WorldReadableFiles'
        enable 'WorldWritableFiles'
    }

    // Configuración de splits para optimización
    splits {
        abi {
            enable true
            reset()
            include 'x86', 'x86_64', 'arm64-v8a', 'armeabi-v7a'
            universalApk true
        }
    }

    // Configuraciones de bundle para optimización
    bundle {
        language {
            enableSplit = false
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    
    // Dependencias de seguridad
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    
    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}