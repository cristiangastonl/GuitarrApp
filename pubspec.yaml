name: guitarr_app
description: "Aplicación para aprender guitarra tocando con feedback en tiempo real"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_riverpod: ^2.4.10

  # Audio & Recording
  flutter_sound: ^9.2.13
  permission_handler: ^11.2.0
  audio_session: ^0.1.18
  just_audio: ^0.9.36
  
  # Audio Analysis
  fftea: ^1.0.2
  ml_algo: ^16.11.1
  
  # Data & Storage
  sqflite: ^2.3.2
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2
  
  # JSON & Serialization
  json_annotation: ^4.8.1
  
  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.2.1
  
  # HTTP & API
  http: ^1.2.0
  flutter_dotenv: ^5.2.1

  # AI
  google_generative_ai: ^0.4.6
  
  # Firebase & Authentication
  firebase_core: ^3.7.0
  firebase_auth: ^5.3.5
  google_sign_in: ^6.2.1
  
  # Security & Encryption
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.1
  
  # Database Encryption
  sqlcipher_flutter_libs: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Generation
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  
  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/audio/
    - assets/audio/chords/clean/A/normal/
    - assets/audio/chords/clean/A/soft/
    - assets/audio/chords/clean/Am/normal/
    - assets/audio/chords/clean/Am/soft/
    - assets/audio/chords/clean/B/normal/
    - assets/audio/chords/clean/B/soft/
    - assets/audio/chords/clean/Bm/normal/
    - assets/audio/chords/clean/Bm/soft/
    - assets/audio/chords/clean/C/normal/
    - assets/audio/chords/clean/C/soft/
    - assets/audio/chords/clean/Cm/normal/
    - assets/audio/chords/clean/Cm/soft/
    - assets/audio/chords/clean/D/normal/
    - assets/audio/chords/clean/D/soft/
    - assets/audio/chords/clean/Dm/normal/
    - assets/audio/chords/clean/Dm/soft/
    - assets/audio/chords/clean/E/normal/
    - assets/audio/chords/clean/E/soft/
    - assets/audio/chords/clean/Em/normal/
    - assets/audio/chords/clean/Em/soft/
    - assets/audio/chords/clean/F/normal/
    - assets/audio/chords/clean/F/soft/
    - assets/audio/chords/clean/Fm/normal/
    - assets/audio/chords/clean/Fm/soft/
    - assets/audio/chords/clean/G/normal/
    - assets/audio/chords/clean/G/soft/
    - assets/audio/chords/clean/Gm/normal/
    - assets/audio/chords/clean/Gm/soft/
    - assets/data/
    - assets/data/exercises/
    - .env
    
  # Fonts (commented out until assets are available)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
